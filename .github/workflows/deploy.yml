name: Deploy - Git Pull on Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code and refresh caches on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.SERVER_PROJECT_PATH }}
            git pull origin main
            # Clear caches so new routes/views/config take effect.
            # The route cache is what makes a freshly added route 404 until cleared.
            php artisan route:clear
            php artisan view:clear
            php artisan config:clear
